name: Fuel Price Scraper

on:
  schedule:
    # 每天北京时间早上8点运行 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许推送代码

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape China fuel prices
        run: python china_fuel_scraper.py

      - name: Scrape global fuel prices
        run: python global_fuel_scraper.py

      - name: Convert to CNY
        run: python fuel_rate_converter.py
        env:
          API_KEY: ${{ secrets.OPENEXCHANGERATES_API_KEY }}

      - name: Detect price changes
        run: python fuel_price_change_detector.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update fuel prices - $(date +'%Y-%m-%d')" && git push)
